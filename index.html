<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="משימות משפחה">
<meta name="theme-color" content="#ffffff">
<title>משימות משפחה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e8e6e0;
    --border-light: #f0ede8;
    --text-primary: #1a1916;
    --text-secondary: #6b6860;
    --text-tertiary: #a8a49e;
    --green: #2d6a4f;
    --green-bg: #eef5f1;
    --green-border: #b7d5c7;
    --red: #8b2e2e;
    --red-bg: #fdf0f0;
    --red-border: #e8bcbc;
    --amber: #92500a;
    --amber-bg: #fdf5eb;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    direction: rtl;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ccc; transition: background .4s;
  }
  .sync-dot.online { background: #52b788; }
  .sync-dot.syncing { background: #f4a261; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .manage-btn {
    font-family: 'Heebo', sans-serif;
    font-size: 13px; font-weight: 400;
    color: var(--text-secondary);
    background: none; border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .manage-btn:active { background: var(--border-light); }

  /* ── Who bar ── */
  .who-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px 12px;
  }
  .who-label {
    font-size: 10px; font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 8px;
  }
  .who-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-family: 'Heebo', sans-serif;
    padding: 5px 13px; border-radius: 20px;
    font-size: 13px; font-weight: 400;
    border: 1px solid var(--border);
    cursor: pointer; transition: all .15s;
    background: var(--bg); color: var(--text-secondary);
    user-select: none;
  }
  .chip.active { font-weight: 500; }
  .chip:active { transform: scale(.96); }

  /* ── Stats ── */
  .stats {
    display: flex; gap: 8px;
    padding: 10px 18px;
  }
  .stat {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 10px; text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num { font-size: 22px; font-weight: 600; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }

  /* ── Day tabs ── */
  .day-tabs {
    display: flex; overflow-x: auto;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 10px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    font-family: 'Heebo', sans-serif;
    flex-shrink: 0; padding: 10px 11px;
    font-size: 13px; font-weight: 400;
    border: none; background: none; cursor: pointer;
    color: var(--text-tertiary);
    border-bottom: 2px solid transparent;
    transition: all .15s; position: relative;
    white-space: nowrap;
  }
  .day-tab.active { color: var(--text-primary); font-weight: 600; border-bottom-color: var(--text-primary); }
  .day-tab .dot {
    position: absolute; top: 6px; left: 7px;
    width: 5px; height: 5px; border-radius: 50%;
    background: #52b788;
  }

  /* ── Tasks ── */
  .tasks { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
    transition: opacity .2s;
  }
  .task-card.all-done { opacity: .6; }

  .task-name {
    font-size: 15px; font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 9px;
    line-height: 1.3;
  }
  .task-name.struck { text-decoration: line-through; color: var(--text-tertiary); }

  .task-done-icon {
    float: left; margin-top: 1px;
    color: #52b788; font-size: 16px;
  }

  .assignees {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-bottom: 9px; min-height: 24px; align-items: center;
  }
  .atag {
    font-size: 12px; padding: 3px 9px;
    border-radius: 20px; display: inline-flex;
    align-items: center; gap: 4px; font-weight: 400;
  }
  .atag.done-tag { text-decoration: line-through; opacity: .55; }
  .atag-check { font-size: 10px; }
  .empty-tag { font-size: 12px; color: var(--text-tertiary); font-style: italic; }

  .task-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .btn {
    font-family: 'Heebo', sans-serif;
    font-size: 13px; font-weight: 400;
    padding: 5px 11px; border-radius: 20px;
    cursor: pointer; border: 1px solid;
    display: inline-flex; align-items: center; gap: 4px;
    transition: all .12s; user-select: none;
  }
  .btn:active { transform: scale(.96); }
  .btn-join { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .btn-leave { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
  .btn-done { background: var(--green-bg); border-color: var(--green-border); color: var(--green); font-weight: 500; }
  .btn-undone { background: var(--bg); border-color: var(--border); color: var(--text-secondary); }

  .gcal-hint {
    margin-top: 7px; font-size: 11px;
    color: var(--text-tertiary);
    display: flex; align-items: center; gap: 4px;
  }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-tertiary); font-size: 14px;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 430px;
    padding: 20px 18px 40px;
    max-height: 80vh; overflow-y: auto;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
  }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close {
    font-family: 'Heebo', sans-serif;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 50%; width: 30px; height: 30px;
    cursor: pointer; font-size: 16px; display: flex;
    align-items: center; justify-content: center;
    color: var(--text-secondary); transition: all .15s;
  }
  .modal-close:active { background: var(--border); }

  .section-label {
    font-size: 10px; font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 8px;
  }
  .divider { border: none; border-top: 1px solid var(--border-light); margin: 16px 0; }

  .modal input[type=text],
  .modal input[type=time] {
    font-family: 'Heebo', sans-serif;
    font-size: 14px; padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text-primary);
    outline: none; transition: border-color .15s;
    direction: rtl;
  }
  .modal input:focus { border-color: #aaa; }

  .member-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .member-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .member-name { flex: 1; font-size: 14px; }

  .task-edit-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .task-edit-row input[type=text] { flex: 1; }
  .task-edit-row input[type=time] { width: 90px; flex-shrink: 0; }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-tertiary); font-size: 18px;
    padding: 4px; display: flex; align-items: center;
    transition: color .15s;
  }
  .del-btn:hover { color: var(--red); }

  .add-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .add-row input[type=text] { flex: 1; }
  .add-row input[type=time] { width: 90px; flex-shrink: 0; }

  .add-btn, .save-btn {
    font-family: 'Heebo', sans-serif;
    width: 100%; padding: 10px;
    font-size: 14px; font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer; transition: all .15s;
  }
  .add-btn {
    background: var(--text-primary); color: #fff;
    border: none; margin-top: 4px;
  }
  .add-btn:active { opacity: .85; }

  /* ── Loading ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 14px;
    color: var(--text-tertiary); font-size: 14px;
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--border);
    border-top-color: var(--text-tertiary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: var(--text-primary); color: #fff;
    border-radius: 20px; padding: 8px 16px;
    font-size: 13px; white-space: nowrap;
    z-index: 200; pointer-events: none;
    opacity: 0; transition: opacity .2s;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
  }
  .toast.show { opacity: 1; }

  /* ── PWA splash padding ── */
  @media (display-mode: standalone) {
    .header { padding-top: env(safe-area-inset-top, 16px); }
    .tasks { padding-bottom: calc(env(safe-area-inset-bottom, 10px) + 10px); }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="loading">
    <div class="spinner"></div>
    מתחבר לשרת...
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-database-compat.min.js"></script>
<script>
// ── Firebase ──
firebase.initializeApp({
  apiKey: "AIzaSyBVrFsKwAxA6HPajJ3SyyGToiW6Sofi-dE",
  authDomain: "family-tasks-643cc.firebaseapp.com",
  databaseURL: "https://family-tasks-643cc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "family-tasks-643cc",
  storageBucket: "family-tasks-643cc.firebasestorage.app",
  messagingSenderId: "938038713749",
  appId: "1:938038713749:web:a89d97ac7d3faf9844ea9c"
});
const db = firebase.database();

// ── Constants ──
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const COLORS = [
  {bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},
  {bg:'#E1F5EE',border:'#0F6E56',text:'#085041'},
  {bg:'#FAECE7',border:'#993C1D',text:'#712B13'},
  {bg:'#FBEAF0',border:'#993556',text:'#72243E'},
  {bg:'#E6F1FB',border:'#185FA5',text:'#0C447C'},
];
const DEFAULT_TASKS = [
  {id:'t1', name:'הוצאת כלבים – בוקר',    time:''},
  {id:'t2', name:'הוצאת כלבים – צהריים',  time:''},
  {id:'t3', name:'הוצאת כלבים – ערב',     time:''},
  {id:'t4', name:'הוצאת אשפה',             time:''},
  {id:'t5', name:'שאיבת רצפת סלון',        time:''},
  {id:'t6', name:'ניקוי חדרי שירותים',     time:''},
  {id:'t7', name:'ריקון אשפה',             time:''},
];

function getColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[Math.abs(h) % COLORS.length];
}
function pad(n) { return String(n).padStart(2,'0'); }
const todayIdx = new Date().getDay();

// ── State ──
let S = {
  members: ['אלון','אתי','סתיו','אור','יערה'],
  tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)),
  slots: {},
  user: localStorage.getItem('familyUser') || null,
  day: todayIdx,
  showManage: false,
  editName: '', editTime: '', newMember: '',
  connected: false, syncing: false, loaded: false,
};

// ── Toast ──
let toastTimer;
function showToast(msg, dur=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ── Firebase sync ──
let saveTimer;
function save() {
  S.syncing = true; render();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    db.ref('data').set({ members: S.members, tasks: S.tasks, slots: S.slots })
      .then(() => { S.syncing = false; render(); })
      .catch(() => { S.syncing = false; showToast('שגיאת שמירה ❌'); render(); });
  }, 500);
}

db.ref('.info/connected').on('value', snap => {
  S.connected = snap.val() === true; render();
});

db.ref('data').on('value', snap => {
  try {
    const val = snap.val();
    if (val) {
      if (val.members && Array.isArray(val.members) && val.members.length) S.members = val.members;
      if (val.tasks && Array.isArray(val.tasks) && val.tasks.length) S.tasks = val.tasks;
      if (val.slots && typeof val.slots === 'object') S.slots = val.slots;
    } else {
      save();
    }
  } catch(e) {
    console.warn('Firebase data error:', e);
  }
  S.loaded = true; render();
});

// ── Slot helpers ──
function slotKey(tid, d) { return tid + '_' + d; }
function getSlot(tid, d) {
  const k = slotKey(tid, d);
  if (!S.slots[k]) S.slots[k] = { a: [], c: [] };
  return S.slots[k];
}

// ── Google Calendar export ──
function exportGCal(task, dayIdx) {
  try {
    const today = new Date();
    const curDay = (today.getDay() + 1) % 7;
    let diff = dayIdx - curDay; if (diff < 0) diff += 7;
    const target = new Date(today); target.setDate(today.getDate() + diff);
    const [hh, mm] = (task.time || '08:00').split(':').map(Number);
    const start = new Date(target); start.setHours(hh, mm, 0, 0);
    const end = new Date(start); end.setMinutes(end.getMinutes() + 30);
    const fmt = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;
    const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(task.name)}&dates=${fmt(start)}/${fmt(end)}&details=${encodeURIComponent('משימה משפחתית – ' + S.user)}`;
    window.open(url, '_blank');
  } catch(e) {}
}

// ── Actions ──
function toggleAssign(tid, d) {
  if (!S.user) { showToast('בחר/י קודם את שמך'); return; }
  const sl = getSlot(tid, d);
  const i = sl.a.indexOf(S.user);
  if (i === -1) {
    sl.a.push(S.user);
    const task = S.tasks.find(t => t.id === tid);
    if (task) { exportGCal(task, d); showToast('נרשמת! האירוע נפתח ב-Google Calendar 📅'); }
  } else {
    sl.a.splice(i, 1);
    sl.c = sl.c.filter(x => x !== S.user);
    showToast('הוסרת מהמשימה');
  }
  save(); render();
}

function toggleDone(tid, d) {
  if (!S.user) return;
  const sl = getSlot(tid, d);
  if (!sl.a.includes(S.user)) return;
  const i = sl.c.indexOf(S.user);
  if (i === -1) { sl.c.push(S.user); showToast('✓ סומן כהושלם'); }
  else sl.c.splice(i, 1);
  save(); render();
}

function addTask() {
  const n = S.editName.trim(); if (!n) return;
  S.tasks.push({ id: 't' + Date.now(), name: n, time: S.editTime || '' });
  S.editName = ''; S.editTime = '';
  save(); render();
}

function delTask(id) {
  S.tasks = S.tasks.filter(t => t.id !== id);
  Object.keys(S.slots).forEach(k => { if (k.startsWith(id + '_')) delete S.slots[k]; });
  save(); render();
}

function addMember() {
  const n = S.newMember.trim();
  if (!n || S.members.includes(n)) return;
  S.members.push(n); S.newMember = '';
  save(); render();
}

function delMember(name) {
  S.members = S.members.filter(m => m !== name);
  Object.values(S.slots).forEach(sl => {
    sl.a = sl.a.filter(x => x !== name);
    sl.c = sl.c.filter(x => x !== name);
  });
  if (S.user === name) { S.user = null; localStorage.removeItem('familyUser'); }
  save(); render();
}

function updateTaskField(id, field, val) {
  const t = S.tasks.find(x => x.id === id); if (t) t[field] = val;
  clearTimeout(saveTimer); saveTimer = setTimeout(save, 1500);
}

function selectUser(name) {
  S.user = name;
  localStorage.setItem('familyUser', name);
  render();
}

// ── Stats ──
function weekStats() {
  let total = 0, done = 0;
  S.tasks.forEach(t => DAYS.forEach((_, d) => {
    const sl = getSlot(t.id, d);
    total += sl.a.length; done += sl.c.length;
  }));
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}
function dayHasDone(d) { return S.tasks.some(t => getSlot(t.id, d).c.length > 0); }

// ── Render ──
function render() {
  if (!S.loaded) return;
  const app = document.getElementById('app');
  const st = weekStats();

  let html = `
    <div class="header">
      <div class="header-left">
        <h1>משימות משפחה</h1>
        <span class="sync-dot ${S.connected ? (S.syncing ? 'syncing' : 'online') : ''}"
              title="${S.connected ? (S.syncing ? 'מסנכרן' : 'מחובר') : 'לא מחובר'}"></span>
      </div>
      <button class="manage-btn" onclick="S.showManage=true;render()">
        ⚙ ניהול
      </button>
    </div>

    <div class="who-bar">
      <div class="who-label">מי אתה/את?</div>
      <div class="who-chips">
        ${S.members.map(m => {
          const col = getColor(m), act = S.user === m;
          return `<div class="chip${act?' active':''}"
            style="${act ? `background:${col.bg};border-color:${col.border};color:${col.text}` : ''}"
            onclick="selectUser('${m}')">${m}</div>`;
        }).join('')}
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num">${st.total}</div><div class="stat-lbl">שיבוצים</div></div>
      <div class="stat"><div class="stat-num">${st.done}</div><div class="stat-lbl">הושלמו</div></div>
      <div class="stat"><div class="stat-num">${st.pct}%</div><div class="stat-lbl">השלמה</div></div>
    </div>

    <div class="day-tabs">
      ${DAYS.map((d, i) => `
        <button class="day-tab${S.day===i?' active':''}" onclick="S.day=${i};render()">
          ${d}${dayHasDone(i) ? '<span class="dot"></span>' : ''}
        </button>`).join('')}
    </div>

    <div class="tasks">`;

  if (!S.tasks.length) {
    html += `<div class="empty-state">אין משימות — הוסף דרך ניהול</div>`;
  } else {
    S.tasks.forEach(task => {
      const sl = getSlot(task.id, S.day);
      const iMine  = S.user && sl.a.includes(S.user);
      const iDone  = S.user && sl.c.includes(S.user);
      const allDone = sl.a.length > 0 && sl.a.every(x => sl.c.includes(x));

      html += `
        <div class="task-card${allDone ? ' all-done' : ''}">
          <div class="task-name${allDone ? ' struck' : ''}">
            ${allDone ? `<span class="task-done-icon">✓</span>` : ''}
            ${task.name}
          </div>

          <div class="assignees">
            ${sl.a.length === 0
              ? `<span class="empty-tag">אף אחד לא שובץ עדיין</span>`
              : sl.a.map(a => {
                  const col = getColor(a), done = sl.c.includes(a);
                  return `<span class="atag${done?' done-tag':''}"
                    style="background:${col.bg};color:${col.text};border:1px solid ${col.border}40">
                    ${done ? `<span class="atag-check">✓</span>` : ''} ${a}
                  </span>`;
                }).join('')
            }
          </div>

          <div class="task-actions">
            ${S.user ? `
              <button class="btn ${iMine?'btn-leave':'btn-join'}"
                onclick="toggleAssign('${task.id}',${S.day})">
                ${iMine ? '✕ הסר' : '+ הצטרף/י'}
              </button>
              ${iMine ? `
                <button class="btn ${iDone?'btn-done':'btn-undone'}"
                  onclick="toggleDone('${task.id}',${S.day})">
                  ${iDone ? '✓ הושלם' : '◯ סמן הושלם'}
                </button>` : ''}
            ` : ''}
          </div>

          ${iMine ? `<div class="gcal-hint">📅 נוסף ל-Google Calendar שלך בעת השיבוץ</div>` : ''}
        </div>`;
    });
  }

  html += `</div>`;

  // ── Manage modal ──
  if (S.showManage) {
    html += `
      <div class="modal-overlay" onclick="if(event.target===this){S.showManage=false;render()}">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title">ניהול</span>
            <button class="modal-close" onclick="S.showManage=false;render()">✕</button>
          </div>

          <div class="section-label">בני המשפחה</div>
          ${S.members.map(m => {
            const col = getColor(m);
            return `<div class="member-row">
              <span class="member-dot" style="background:${col.border}"></span>
              <span class="member-name">${m}</span>
              <button class="del-btn" onclick="delMember('${m}')">🗑</button>
            </div>`;
          }).join('')}
          <div class="add-row" style="margin-top:6px">
            <input type="text" placeholder="שם חדש..."
              value="${S.newMember}"
              oninput="S.newMember=this.value"
              onkeydown="if(event.key==='Enter')addMember()">
            <button class="btn btn-join" onclick="addMember()" style="white-space:nowrap">+ הוסף</button>
          </div>

          <hr class="divider">
          <div class="section-label">משימות</div>

          ${S.tasks.map(t => `
            <div class="task-edit-row">
              <input type="text" value="${t.name}"
                oninput="updateTaskField('${t.id}','name',this.value)">
              <input type="time" value="${t.time}"
                oninput="updateTaskField('${t.id}','time',this.value)">
              <button class="del-btn" onclick="delTask('${t.id}')">🗑</button>
            </div>`).join('')}

          <div class="add-row" style="margin-top:8px">
            <input type="text" placeholder="משימה חדשה..."
              value="${S.editName}"
              oninput="S.editName=this.value"
              onkeydown="if(event.key==='Enter')addTask()">
            <input type="time" value="${S.editTime}"
              oninput="S.editTime=this.value">
          </div>
          <button class="add-btn" onclick="addTask()">+ הוסף משימה</button>
        </div>
      </div>`;
  }

  app.innerHTML = html;
}
</script>
</body>
</html>
